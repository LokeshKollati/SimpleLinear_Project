
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Predictor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 35px;
            width: 340px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            padding: 12px;
            width: 100%;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            padding: 12px;
            width: 100%;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #43a047;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 16px;
            font-weight: bold;
        }

        .result span {
            display: block;
            margin-top: 5px;
            font-size: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>💼 Salary Predictor</h2>

    <form action="/predict" method="post">
        <input type="number" name="years" 
       placeholder="Years of Experience" 
       min="0" step="0.1" required>
        <button type="submit">Predict Salary</button>
    </form>

    {% if result %}
        <div class="result">
            For {{ years }} years experience:
            <span>₹ {{ "%.2f" % result[0] }}</span>
        </div>
    {% endif %}

</div>

</body>
</html>
